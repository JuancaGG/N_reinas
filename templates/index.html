<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Reinas Evolutivo | AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="contenedor">
        <div class="panel-control">
            <h2>⚙️ Configuración Evolutiva</h2>
            
            <div class="grupo-input">
                <label for="n_reinas">Tamaño del Tablero (N):</label>
                <input type="number" id="n_reinas" value="8" min="4" max="20">
            </div>

            <div class="grupo-input">
                <label for="poblacion">Tamaño de la Población:</label>
                <input type="number" id="poblacion" value="100" min="10" step="10">
            </div>

            <div class="grupo-input">
                <label for="mutacion">Tasa de Mutación (0 a 1):</label>
                <input type="number" id="mutacion" value="0.1" min="0.01" max="1" step="0.05">
            </div>

            <button id="btn-resolver" class="btn-principal">🚀 Resolver con IA</button>

            <div id="caja-resultados" class="oculto">
                <h3>Resultados:</h3>
                <p id="texto-estado"></p>
                <p id="texto-generaciones"></p>
            </div>
        </div>

        <div class="panel-tablero">
            <div id="tablero-contenedor">
                </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
